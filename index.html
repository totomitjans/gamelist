<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#ff0039">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gamelist">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shabii's Gamelist</title>
    <link rel="icon" type="image/png" href="assets/Icon.png">
    <link rel="apple-touch-icon" href="assets/app-Icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preload" as="image" href="assets/platforms/playstation.png">
    <link rel="preload" as="image" href="assets/platforms/steam.png">
    <link rel="preload" as="image" href="assets/platforms/switch.png">
    <link rel="preload" as="image" href="assets/stores/amazon.ico">
    <link rel="preload" as="image" href="assets/stores/game.ico">
    <link rel="preload" as="image" href="assets/stores/playasia.ico">
    <link rel="preload" as="image" href="assets/stores/xtralife.ico">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="backdrop"></div>
    <header class="topbar">
      <a class="brand" href="#backlog" aria-label="Shabii's Gamelist">
        <img class="brand-mark" src="assets/Icon.png" alt="">
        <span>Shabii's Gamelist</span>
      </a>
      <nav class="nav-tabs" aria-label="Sections">

      </nav>
      <div class="top-actions">
        <button class="icon-button" id="syncButton" type="button" title="Sync" aria-label="Sync">
          <svg class="reload-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 8.2A7.2 7.2 0 1 0 20.1 14"></path>
            <path d="M19.2 3.8v4.8h-4.8"></path>
          </svg>
        </button>
        <button class="ghost-button" id="fetchPricesButton" type="button" hidden>
          <svg class="euro-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 5.5A7 7 0 0 0 8.2 7.1 7.4 7.4 0 0 0 7 12a7.4 7.4 0 0 0 1.2 4.9A7 7 0 0 0 19 18.5"></path>
            <path d="M4 10h10"></path>
            <path d="M4 14h10"></path>
          </svg>
          <span class="button-label">Fetch New Prices</span>
        </button>
        <button class="ghost-button" id="loginButton" type="button" title="Edit" aria-label="Edit">
          <svg class="pencil-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16v4Z"></path>
            <path d="M13.5 6.5l4 4"></path>
          </svg>
        </button>
        <button class="primary-button" id="addButton" type="button" hidden><span class="button-label">Add Game</span><span class="button-icon" aria-hidden="true">+</span></button>
      </div>
    </header>

    <main class="shell">
      <section class="playing-section" id="playingSection" hidden>
        <div class="column-head">
          <div>
            <h2>Currently Playing</h2>
          </div>
          <div class="playing-head-actions">
            <span id="playingCount"></span>
            <button class="icon-button playing-slider-button" id="playingPrevButton" type="button" title="Previous playing game" aria-label="Previous playing game">←</button>
            <button class="icon-button playing-slider-button" id="playingNextButton" type="button" title="Next playing game" aria-label="Next playing game">→</button>
          </div>
        </div>
        <div class="playing-panel">
          <div class="card-list playing-list" data-section="playing"></div>
        </div>
      </section>

      <section class="achievement-section" id="achievementSection">
        <div class="column-head">
          <div>
            <h2>Trophies</h2>
          </div>
          <a id="achievementProfileLink" href="https://www.playstation.com/" target="_blank" rel="noreferrer">PSN activity</a>
        </div>
        <div class="achievement-panel glass" id="achievementPanel">
          <div class="achievement-loading">Loading latest trophies...</div>
        </div>
      </section>

      <section class="hero">
        <div class="stats" id="stats" aria-live="polite"></div>
        <div class="release-calendar glass" id="releaseCalendar" aria-label="Upcoming release calendar"></div>
      </section>

      <section class="toolbar glass">
        <label class="search">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Game, platform, store, status...">
        </label>
        <label class="check-filter toggle-check toolbar-check">
          <input id="preorderedFilter" type="checkbox">
          <span>Preordered</span>
        </label>
        <label>
          <span>Platform</span>
          <select id="platformFilter"></select>
        </label>
        <label>
          <span>Category</span>
          <select id="tagFilter"></select>
        </label>
        <label>
          <span>Order</span>
          <div class="order-control">
            <select id="sortFilter">
              <option value="time" selected>Time</option>
              <option value="title">Name</option>
              <option value="platform">Platform</option>
              <option value="custom">Custom backlog</option>
            </select>
            <button class="direction-toggle" id="sortDirectionButton" type="button" title="Sort ascending" aria-label="Sort ascending">↑</button>
          </div>
        </label>
      </section>

      <nav class="mobile-section-tabs" aria-label="Mobile sections">
        <button type="button" data-mobile-section="backlog">Backlog</button>
        <button type="button" data-mobile-section="upcoming">To Release</button>
        <button type="button" data-mobile-section="wanted">Available</button>
      </nav>

      <section class="board" aria-live="polite">
        <article class="column" id="backlog">
          <div class="column-head">
            <div>
              <h2>Backlog</h2>
            </div>
            <span id="backlogCount"></span>
          </div>
          <div class="card-list sortable" data-section="backlog"></div>
        </article>

        <article class="column" id="upcoming">
          <div class="column-head">
            <div>
              <h2>To Release</h2>
            </div>
            <span id="upcomingCount"></span>
          </div>
          <div class="card-list" data-section="upcoming"></div>
        </article>

        <article class="column" id="wanted">
          <div class="column-head">
            <div>
              <h2>Available now</h2>
            </div>
            <span id="wantedCount"></span>
          </div>
          <div class="card-list" data-section="wanted"></div>
        </article>
      </section>

      <section class="completed" id="completed">
        <div class="column-head">
          <div>
            <h2>Finished games</h2>
          </div>
          <span id="completedCount"></span>
        </div>
        <div class="completed-panel glass">
          <div class="completed-list" data-section="completed"></div>
        </div>
      </section>
    </main>

    <dialog id="gameDialog">
      <form method="dialog" class="modal" id="gameForm">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Game details</p>
            <h2 id="dialogTitle">Add Game</h2>
          </div>
          <label class="check-filter toggle-check modal-playing-check">
            <input id="playingInput" type="checkbox">
            <span>Playing</span>
          </label>
          <button class="icon-button" id="closeDialogButton" type="button" title="Close">×</button>
        </div>

        <input type="hidden" id="gameId">
        <div class="lookup-row">
          <label>
            <span>Search DB or IGDB URL</span>
            <input id="lookupInput" type="search" placeholder="Type a game name or paste an IGDB page">
          </label>
          <button class="ghost-button icon-only-button" id="lookupButton" type="button" title="Search" aria-label="Search">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M16.5 16.5 21 21"></path>
            </svg>
          </button>
        </div>
        <div class="lookup-results" id="lookupResults"></div>

        <section class="form-group">
          <h3>Playing</h3>
          <div class="form-grid">
            <label>
              <span>Started</span>
              <input id="startedAtInput" type="date">
            </label>
            <label>
              <span>Finished</span>
              <input id="completedAtInput" type="date">
            </label>
            <label>
              <span>Replay Count</span>
              <input id="replayCountInput" type="number" min="0" step="1" placeholder="0">
            </label>
            <label class="check-filter toggle-check form-check">
              <input id="platinumInput" type="checkbox">
              <span>Completed Achievements</span>
            </label>
          </div>
        </section>

        <section class="form-group">
          <h3>Collecting Information</h3>
          <div class="form-grid">
            <label>
              <span>Title</span>
              <input id="titleInput" required>
            </label>
            <label>
              <span>Platform</span>
              <input id="platformInput" list="platformOptions">
            </label>
            <label>
              <span>List</span>
              <select id="sectionInput">
                <option value="wanted">Available now</option>
                <option value="upcoming">To Release</option>
                <option value="backlog">Backlog</option>
              </select>
            </label>
            <label>
              <span>Release Date</span>
              <input id="releaseDateInput" type="date">
            </label>
            <label>
              <span>Release Text</span>
              <input id="releaseTextInput" placeholder="2026?, 18 June, TBA...">
            </label>
            <label>
              <span>Length</span>
              <input id="lengthInput" type="number" min="0" step="0.5" placeholder="Hours">
            </label>
            <label>
              <span>Preordered Where</span>
              <input id="preorderStoreInput" placeholder="Xtralife, Game, Amazon...">
            </label>
            <label>
              <span>Preferred Store</span>
              <input id="preferredStoreInput" placeholder="Playasia, Limited Run...">
            </label>
            <label>
              <span>Owners</span>
              <input id="ownersInput" list="ownerOptions" placeholder="Xavi, Jordi, Judy">
            </label>
            <label>
              <span>Status</span>
              <input id="statusesInput" list="statusOptions" placeholder="To Collect, Scarce, Waiting for Physical">
            </label>
            <label class="check-filter toggle-check form-check">
              <input id="digitalInput" type="checkbox">
              <span>Digital</span>
            </label>
            <label class="check-filter toggle-check form-check">
              <input id="coopInput" type="checkbox">
              <span>Coop</span>
            </label>
            <label>
              <span>Game Tags</span>
              <input id="genresInput" placeholder="Adventure, RPG, FPS">
            </label>
            <label class="wide">
              <span>Notes</span>
              <textarea id="notesInput" rows="3"></textarea>
            </label>
          </div>
        </section>

        <section class="form-group">
          <h3>Game Data</h3>
          <div class="form-grid">
            <label>
              <span>Developer</span>
              <input id="developerInput" placeholder="Studio">
            </label>
            <label>
              <span>Publisher</span>
              <input id="publisherInput" placeholder="Publisher">
            </label>
            <label class="wide">
              <span>Description</span>
              <textarea id="descriptionInput" rows="4" placeholder="Manual description or fetched game summary"></textarea>
            </label>
            <label class="wide">
              <span>IGDB Page</span>
              <input id="igdbUrlInput" placeholder="https://www.igdb.com/games/...">
            </label>
            <label class="wide">
              <span>Trailer URL</span>
              <input id="trailerUrlInput" placeholder="https://www.youtube.com/watch?v=...">
            </label>
            <label>
              <span>PlayStation Store URL</span>
              <input id="playstationUrlInput" placeholder="https://store.playstation.com/...">
            </label>
            <label>
              <span>Nintendo Store URL</span>
              <input id="nintendoUrlInput" placeholder="https://www.nintendo.com/...">
            </label>
            <label class="wide">
              <span>Steam URL</span>
              <input id="steamUrlInput" placeholder="https://store.steampowered.com/app/...">
            </label>
            <label class="wide">
              <span>Cover URL</span>
              <input id="coverInput" placeholder="https://...">
            </label>
            <label class="wide">
              <span>Upload Cover</span>
              <input id="coverUpload" type="file" accept="image/*">
            </label>
          </div>
        </section>

        <datalist id="platformOptions">
          <option value="Switch"></option>
          <option value="Switch 2"></option>
          <option value="PS5"></option>
          <option value="PS4"></option>
          <option value="PS2"></option>
          <option value="PlayStation 2"></option>
          <option value="PC"></option>
          <option value="Xbox"></option>
        </datalist>

        <datalist id="statusOptions">
          <option value="To Collect"></option>
          <option value="Scarce"></option>
          <option value="Waiting for Physical"></option>
        </datalist>

        <datalist id="ownerOptions">
          <option value="Xavi"></option>
          <option value="Jordi"></option>
          <option value="Judy"></option>
        </datalist>

        <div class="modal-actions">
          <button class="danger-button icon-only-button" id="deleteButton" type="button" title="Delete" aria-label="Delete">
            <svg class="trash-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v5"></path>
              <path d="M14 11v5"></path>
            </svg>
          </button>
          <button class="ghost-button" id="pricesButton" type="button">Refresh Prices</button>
          <button class="primary-button" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="detailDialog">
      <article class="detail-modal glass">
        <button class="icon-button detail-close" id="detailCloseButton" type="button" title="Close">×</button>
        <div class="detail-cover">
          <img alt="">
        </div>
        <div class="detail-body">
          <h2 id="detailTitle"></h2>
          <div class="studio-line" id="detailStudio"></div>
          <div class="meta" id="detailMeta"></div>
          <div class="play-dates detail-dates" id="detailDates"></div>
          <div class="chips" id="detailChips"></div>
          <div class="store-links" id="detailStoreLinks"></div>
          <p id="detailDescription"></p>
          <div class="prices detail-prices" id="detailPrices"></div>
          <section class="detail-trophies" id="detailTrophies" hidden>
            <div class="detail-trophies-head">
              <h3>Trophies</h3>
              <div class="detail-trophy-tools">
                <span id="detailTrophyCount"></span>
                <select id="detailTrophySort" aria-label="Sort trophies">
                  <option value="order">Order</option>
                  <option value="name">Name</option>
                  <option value="completed">Completed</option>
                </select>
                <button class="direction-toggle" id="detailTrophyDirection" type="button" title="Sort ascending" aria-label="Sort ascending">↑</button>
              </div>
            </div>
            <div class="detail-trophy-list" id="detailTrophyList"></div>
          </section>
        </div>
      </article>
    </dialog>

    <dialog id="historyDialog">
      <article class="history-modal glass">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Finished games</p>
            <h2>Finished by year</h2>
          </div>
          <button class="icon-button" id="historyCloseButton" type="button" title="Close">×</button>
        </div>
        <div class="year-tabs" id="historyYearTabs"></div>
        <div class="history-list" id="historyList"></div>
      </article>
    </dialog>

    <dialog id="releaseDialog">
      <article class="release-modal glass">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Release day</p>
            <h2 id="releaseDialogTitle"></h2>
          </div>
          <button class="icon-button" id="releaseCloseButton" type="button" title="Close">×</button>
        </div>
        <div class="card-list release-dialog-list" id="releaseDialogList"></div>
      </article>
    </dialog>

    <template id="cardTemplate">
      <article class="game-card glass" draggable="false">
        <div class="card-trailer" aria-hidden="true"></div>
        <button class="icon-button trailer-toggle" type="button" title="Pause trailer" aria-label="Pause trailer" hidden></button>
        <button class="cover-button" type="button">
          <img alt="">
        </button>
        <div class="game-main">
          <div class="title-line">
            <h3></h3>
            <button class="icon-button edit-action" type="button" title="Edit" aria-label="Edit">
              <svg class="pencil-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16v4Z"></path>
                <path d="M13.5 6.5l4 4"></path>
              </svg>
            </button>
          </div>
          <div class="studio-line"></div>
          <div class="meta"></div>
          <div class="play-dates"></div>
          <div class="chips"></div>
          <div class="card-trophies"></div>
          <div class="card-actions">
            <button class="ghost-button price-refresh-action" type="button">Prices</button>
            <button class="ghost-button bought-action" type="button">Got it</button>
            <button class="primary-button complete-action" type="button">Finished</button>
            <button class="ghost-button trophy-action" type="button" title="Completed" aria-label="Completed">
              <svg class="trophy-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 4h8v4a4 4 0 0 1-8 0V4Z"></path>
                <path d="M8 6H5a3 3 0 0 0 3 3"></path>
                <path d="M16 6h3a3 3 0 0 1-3 3"></path>
                <path d="M12 12v4"></path>
                <path d="M9 20h6"></path>
                <path d="M10 16h4v4h-4z"></path>
              </svg>
            </button>
            <button class="danger-button icon-only-button delete-action" type="button" title="Delete" aria-label="Delete">
              <svg class="trash-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
                <path d="M10 11v5"></path>
                <path d="M14 11v5"></path>
              </svg>
            </button>
          </div>
        </div>
        <p class="notes"></p>
        <div class="prices"></div>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
