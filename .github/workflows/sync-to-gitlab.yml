name: Sync to GitLab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_REPOSITORY: ${{ secrets.GITLAB_REPOSITORY }}
        run: |
          if [ -z "$GITLAB_TOKEN" ] || [ -z "$GITLAB_USERNAME" ] || [ -z "$GITLAB_REPOSITORY" ]; then
            echo "Missing one of: GITLAB_TOKEN, GITLAB_USERNAME, GITLAB_REPOSITORY"
            exit 1
          fi

          git remote add gitlab "https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@gitlab.com/${GITLAB_REPOSITORY}.git"
          git push gitlab main --force
